<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>nojidentaku Pro Custom</title>
    <style>
        :root { 
            --app-bg: #1a1a1a;
            --list-bg: #f7f9f9; 
            --header-mist: #ffffff; 
            --key-num: #efefef; 
            --key-op: #555555;  
            --active-gold: #fff59d;
            --btn-radius: 12px;
            --app-height: 100dvh;
            --font-weight-num: 700;
        }
        .bold-nums { --font-weight-num: 900; }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--app-bg); font-family: -apple-system, sans-serif; height: var(--app-height); overflow: hidden; color: white; display: flex; justify-content: center; }
        
        .app-container { display: flex; height: 100%; width: 100%; max-width: 1366px; padding: 12px; gap: 12px; }
        
        .fs-active #keypad { display: none !important; }
        .fs-active #mainView { flex: 1; }

        .lists-view-port { flex: 1.2; overflow: hidden; position: relative; border-radius: 12px; background: var(--list-bg); }
        .lists-scroll-container { display: flex; height: 100%; width: 100%; gap: 1px; background: rgba(0,0,0,0.1); }
        .list-column { display: flex; flex-direction: column; flex: 1; min-width: 0; background: var(--list-bg); }
        
        /* 【修正】列の合計表示：大きく、白く */
        .col-total { 
            height: 55px; /* 大きく */
            background: #fafafa; /* ちょい白 */
            border-bottom: 2px solid rgba(0,0,0,0.1); /* 線も少し太く */
            display: flex; 
            align-items: center; 
            justify-content: flex-end; 
            padding: 0 15px; 
            color: #000; 
            font-weight: 900; 
            font-size: 1.3rem; /* 文字も大きく */
        }

        .history-area { 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .history-area::-webkit-scrollbar { display: none; }
        
        .history-item { 
            flex: 1; min-height: 60px; border-bottom: 1px solid rgba(0,0,0,0.05); 
            display: flex; flex-direction: column; align-items: flex-end; justify-content: center; 
            padding-right: 12px; color: #222; font-size: 1.4rem; font-weight: var(--font-weight-num); position: relative; 
        }
        .selected-row { background: var(--active-gold) !important; }
        .p-mark { font-size: 0.8rem; color: #fff; background: #000; border-radius: 4px; padding: 2px 5px; margin-right: 5px; font-weight: 900; }
        .memo-text { font-size: 0.85rem; color: #1565c0; position: absolute; left: 10px; top: 8px; font-weight: normal; }

        #exit-fs-btn { position: absolute; bottom: 30px; right: 30px; z-index: 6000; background: #f44336; color: white; border: none; padding: 20px 35px; border-radius: 40px; font-weight: bold; display: none; box-shadow: 0 5px 20px rgba(0,0,0,0.5); font-size: 1.2rem; }

        .keypad-container { flex: 1; display: flex; flex-direction: column; gap: 12px; max-width: 480px; }
        
        .btn { border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; transition: 0.1s; }
        .btn:active { transform: scale(0.96); opacity: 0.8; }

        .joined-row { display: flex; height: 55px; }
        .joined-row .btn { flex: 1; border-radius: 0; }
        .joined-row .btn:first-child { border-top-left-radius: var(--btn-radius); border-bottom-left-radius: var(--btn-radius); }
        .joined-row .btn:last-child { border-top-right-radius: var(--btn-radius); border-bottom-right-radius: var(--btn-radius); }
        
        .grid-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; flex-grow: 1; }
        .grid-keys .btn { border-radius: var(--btn-radius); }
        
        .num-key { background: var(--key-num); color: #333; font-size: 1.7rem; font-weight: var(--font-weight-num); }
        .op-key { background: var(--key-op); color: white; font-size: 1.4rem; }
        .c-key { background: #cfd8dc; color: #37474f; font-size: 1.4rem; }

        .reward-area { 
            background: #e1f5fe; border-radius: 12px; padding: 12px; 
            display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; 
            border: 1px solid #b3e5fc; height: 100px;
        }
        .reward-col { display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #b3e5fc; }
        .reward-col:last-child { border-right: none; }
        .reward-val { font-weight: 900; color: #e65100; font-size: 1.2rem; }
        .reward-card { font-size: 0.95rem; color: #0277bd; font-weight: 900; margin-top: 5px; }

        .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; height: 65px; }
        .bottom-row .btn { border-radius: var(--btn-radius); }

        .settings-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 5000; display: none; padding: 20px; align-items: center; justify-content: center; }
        .modal-content { background: #222; border-radius: 20px; padding: 25px; width: 100%; max-width: 420px; }
        .setting-section { margin-bottom: 20px; padding-bottom: 15px; border-bottom: 2px solid #333; }
        .setting-section:last-of-type { border-bottom: none; }
        .setting-title { color: #4db6ac; font-size: 1rem; margin-bottom: 12px; font-weight: bold; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
        .dot { width: 100%; aspect-ratio: 1/1; border-radius: 8px; cursor: pointer; border: 2px solid transparent; }
        .rate-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
        .rate-btn { background: #444; color: white; border: none; padding: 12px 0; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body id="appBody">

<div class="app-container" id="appContainer">
    <div class="lists-view-port" id="mainView">
        <div class="lists-scroll-container" id="scrollContainer"></div>
        <button id="exit-fs-btn" onclick="toggleFS()">全画面解除</button>
    </div>

    <div class="keypad-container" id="keypad">
        <div class="joined-row">
            <button class="btn" style="background:#b0bec5; color:#37474f;" onclick="openSet(true)">⚙</button>
            <button class="btn" style="background:#4db6ac;" onclick="doMemo()">🔍</button>
            <button class="btn" style="background:#000;" onclick="doP()" id="p-btn">P</button>
        </div>
        
        <div class="joined-row">
            <button class="btn" style="background:#1e88e5;" id="y-btn" onclick="doY()">横計算</button>
            <button class="btn" style="background:#7e57c2;" onclick="do4()">4連電卓</button>
            <button class="btn" style="background:#78909c;" onclick="toggleFS()">全画面</button>
        </div>

        <div class="grid-keys">
            <button class="btn num-key" onclick="dn(7)">7</button><button class="btn num-key" onclick="dn(8)">8</button><button class="btn num-key" onclick="dn(9)">9</button><button class="btn c-key" onclick="doC()">C</button>
            <button class="btn num-key" onclick="dn(4)">4</button><button class="btn num-key" onclick="dn(5)">5</button><button class="btn num-key" onclick="dn(6)">6</button><button class="btn op-key" onclick="doMult()">×</button>
            <button class="btn num-key" onclick="dn(1)">1</button><button class="btn num-key" onclick="dn(2)">2</button><button class="btn num-key" onclick="dn(3)">3</button><button class="btn op-key" onclick="doOff()">%</button>
            <button class="btn num-key" onclick="dn(0)">0</button><button class="btn num-key" onclick="dn('00')">00</button><button class="btn op-key" onclick="doOp('+')">+</button><button class="btn op-key" onclick="doOp('-')">-</button>
        </div>

        <div class="reward-area" id="rewardBox"></div>

        <div class="bottom-row">
            <button class="btn" style="background:#607d8b;" onclick="doAC()">AC 全消去</button>
            <button class="btn" style="background:#607d8b;" onclick="doCC()">列消去</button>
        </div>
    </div>
</div>

<div id="set-panel" class="settings-panel">
    <div class="modal-content">
        <div class="setting-section">
            <div class="setting-title">表示設定</div>
            <label style="color:white; display:flex; align-items:center; gap:10px;">
                <input type="checkbox" id="boldCheck" onchange="setBold(this.checked)" style="width:20px; height:20px;"> 数字を太くする
            </label>
        </div>
        <div class="setting-section">
            <div class="setting-title">背景色</div>
            <div class="color-grid" id="bgPalette"></div>
        </div>
        <div class="setting-section">
            <div class="setting-title">還元率設定</div>
            <div class="rate-grid" id="rtPalette"></div>
        </div>
        <button class="btn" style="width:100%; height:50px; background:#fff; color:#000; border-radius:12px;" onclick="openSet(false)">閉じる</button>
    </div>
</div>

<script>
    let ai=0, sr=0, iy=false, i4=false, ip=false;
    let data = Array.from({length:4},()=>Array.from({length:15},()=>({val:0,isP:false,memo:"",rate:0})));
    const clrs = ['#f7f9f9','#e3f2fd','#fce4ec','#e8f5e9','#fff3e0','#ffffff','#f5f5f5','#e0f2f1','#fffde7','#d1c4e9'];
    const rates = [0, 1, 3, 5, 7, 10, 15, 20];

    function init() {
        const bg = localStorage.getItem('bg') || '#f7f9f9';
        const bld = localStorage.getItem('bld') === 'true';
        document.documentElement.style.setProperty('--list-bg', bg);
        document.getElementById('boldCheck').checked = bld;
        setBold(bld);
        renderCols();
        
        const bgP = document.getElementById('bgPalette');
        clrs.forEach(c => {
            const d = document.createElement('div'); d.className='dot'; d.style.background=c;
            d.onclick=()=>{document.documentElement.style.setProperty('--list-bg',c); localStorage.setItem('bg',c);};
            bgP.appendChild(d);
        });

        const rtP = document.getElementById('rtPalette');
        rates.forEach(r => {
            const b = document.createElement('button'); b.className='rate-btn'; b.innerText=r+'%';
            b.onclick=()=>{ data[ai][sr].rate=r; if(iy) for(let i=ai+1;i<(i4?4:3);i++) data[i][sr].rate=r; render(); };
            rtP.appendChild(b);
        });
    }

    function renderCols() {
        const cont = document.getElementById('scrollContainer'); cont.innerHTML = '';
        const n = i4 ? 4 : 3;
        for(let i=0; i<n; i++) {
            const col = document.createElement('div'); col.className = 'list-column';
            col.innerHTML = `<div class="col-total" id="col-t-${i}">0</div><div class="history-area">${data[i].map((_,j)=>`<div class="history-item" id="c-${i}-${j}" onclick="sel(${i},${j})"></div>`).join('')}</div>`;
            cont.appendChild(col);
        }
        render();
    }

    function render() {
        const box = document.getElementById('rewardBox'); box.innerHTML = '';
        const n = i4 ? 4 : 3;
        for(let i=0; i<n; i++) {
            const list = data[i];
            const sum = list.reduce((s,x)=>x.isP?s:s+x.val, 0);
            const tc = list.reduce((s,x)=>s+Math.floor(x.val*(x.rate/100)), 0);
            const tk = list.reduce((s,x)=>s+Math.floor(x.val*(Math.max(0,x.rate-2)/100)), 0);
            
            const head = document.getElementById(`col-t-${i}`);
            if(head) head.innerText = sum.toLocaleString();

            box.innerHTML += `<div class="reward-col">
                <div class="reward-val">${tc.toLocaleString()}</div>
                <div class="reward-card">💳${tk.toLocaleString()}</div>
            </div>`;
            list.forEach((item, j) => {
                const el = document.getElementById(`c-${i}-${j}`);
                if(el) {
                    let h = `<div class="memo-text">${item.memo}</div>`;
                    let v = item.val===0 ? "" : item.val.toLocaleString();
                    if(item.isP && item.val!==0) v = `<span class="p-mark">P</span>` + v;
                    h += `<div>${v}</div>`;
                    if(item.val!==0 && item.rate!==0) h += `<div style="font-size:0.65rem; color:#888;">${item.rate}%</div>`;
                    el.innerHTML = h; el.classList.toggle('selected-row', (i===ai && j===sr));
                }
            });
        }
    }

    function dn(v) {
        const u = (i) => {
            let t = data[i][sr]; let s = Math.abs(t.val).toString();
            t.val = (parseInt((s==="0"?"":s)+v)||0)*(t.val<0?-1:1);
            t.isP = ip; if(iy && i>ai) t.rate = data[ai][sr].rate;
        };
        if(iy) { for(let i=ai; i<(i4?4:3); i++) u(i); } else { u(ai); } render();
    }

    function sel(l,r) { ai=l; sr=r; render(); }
    function doMemo() { const m = prompt("ラベルを入力", ""); if(m !== null) { data[ai][sr].memo = m; render(); } }
    function doP() { ip = !ip; document.getElementById('p-btn').style.border = ip ? "3px solid #fff" : "none"; }
    function doY() { iy = !iy; document.getElementById('y-btn').style.filter = iy ? "brightness(1.5)" : "none"; }
    function do4() { i4 = !i4; renderCols(); }
    function setBold(b) { if(b) document.getElementById('appBody').classList.add('bold-nums'); else document.getElementById('appBody').classList.remove('bold-nums'); localStorage.setItem('bld', b); }
    function openSet(s) { document.getElementById('set-panel').style.display = s?'flex':'none'; }
    
    function toggleFS() {
        const app = document.getElementById('appContainer');
        const btn = document.getElementById('exit-fs-btn');
        if (!document.fullscreenElement) {
            document.documentElement.requestFullscreen().catch(() => { app.classList.add('fs-active'); btn.style.display = 'block'; });
            app.classList.add('fs-active'); btn.style.display = 'block';
        } else {
            document.exitFullscreen(); app.classList.remove('fs-active'); btn.style.display = 'none';
        }
    }

    function doC() { data[ai][sr].val=0; data[ai][sr].rate=0; data[ai][sr].memo=""; data[ai][sr].isP=false; render(); }
    function doMult() { const v=prompt("数値を入力"); if(v){ const f=parseFloat(v); if(!isNaN(f)) { data[ai][sr].val=Math.round(data[ai][sr].val*f); render(); } } }
    function doOff() { const v=prompt("何%オフにしますか？"); if(v){ const f=parseFloat(v); if(!isNaN(f)) { data[ai][sr].val=Math.round(data[ai][sr].val * (1 - f/100)); render(); } } }
    function doOp(o) { const f=(i)=>data[i][sr].val=Math.abs(data[i][sr].val)*(o==='-'?-1:1); if(iy) for(let i=ai;i<(i4?4:3);i++) f(i); else f(ai); render(); }
    function doAC() { if(confirm("全削除してよろしいですか？")) { data.forEach(l=>l.forEach(x=>{x.val=0;x.isP=false;x.memo="";x.rate=0;})); render(); } }
    function doCC() { data[ai].forEach(x=>{x.val=0;x.isP=false;x.memo="";x.rate=0;}); render(); }

    init();
</script>
</body>
</html>
