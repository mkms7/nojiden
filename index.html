<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Comparison Pro - Optimized Edition</title>
    <style>
        :root { 
            --app-bg: #1a1a1a;
            --list-bg: #e3f2fd; 
            --header-mist: #ffffff; 
            --key-num: #efefef; 
            --key-op: #555555;  
            --active-gold: #fff9c4;
            --btn-radius: 6px;
        }
        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; outline: none; }
        body { margin: 0; background: var(--app-bg); font-family: sans-serif; height: 100vh; overflow: hidden; color: white; }
        .app-container { display: flex; height: 100vh; padding: 8px; gap: 10px; }
        
        /* 計算欄 */
        .lists-view-port { flex: 1.1; overflow: hidden; position: relative; border-radius: 8px; background: var(--list-bg); transition: 0.3s; }
        .lists-scroll-container { display: flex; height: 100%; width: 100%; gap: 1px; background: rgba(0,0,0,0.1); }
        .list-column { display: flex; flex-direction: column; flex: 1; min-width: 0; background: var(--list-bg); }
        .total-display { height: 45px; color: #000; display: flex; align-items: center; justify-content: flex-end; padding: 0 8px; font-size: 1.1rem; font-weight: 900; background: var(--header-mist); border-bottom: 2px solid rgba(0,0,0,0.1); }
        .history-area { flex-grow: 1; display: flex; flex-direction: column; }
        .history-item { flex: 1; border-bottom: 1px solid rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: flex-end; justify-content: center; padding-right: 6px; color: #000; font-size: 0.9rem; font-weight: 700; position: relative; }
        .selected-row { background: var(--active-gold) !important; }
        .p-mark { font-size: 0.6rem; color: #d32f2f; border: 1px solid #d32f2f; border-radius: 2px; padding: 0 1px; margin-right: 2px; }
        .memo-text { font-size: 0.65rem; color: #1565c0; position: absolute; left: 4px; top: 2px; font-weight: normal; }

        /* 右側パネル ここ複雑だから再度確認するよう*/
        .keypad-container { flex: 1; display: flex; flex-direction: column; gap: 6px; }
        
        /* 2段の上部ボタン歯車の位置や機能漏れないように */
        .control-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
        .icon-btn { height: 55px; border-radius: var(--btn-radius); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: bold; color: white; font-size: 0.85rem; }
        
        /* 還元ボード（数字のみ） */
        .reward-board { background: #e1f5fe; color: #01579b; border-radius: 6px; padding: 4px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; border: 1px solid #b3e5fc; height: 60px; }
        .reward-col { display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 1px solid #b3e5fc; }
        .reward-col:last-child { border-right: none; }
        .reward-val { font-weight: 900; color: #e65100; font-size: 0.9rem; }
        .reward-card { font-size: 0.6rem; color: #0277bd; }

        .grid-keys { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; flex-grow: 1; }
        .key { border: none; border-radius: var(--btn-radius); font-size: 1.4rem; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; }
        .num-key { background: var(--key-num); color: #333; }
        .op-key { background: var(--key-op); color: white; }

        .bottom-row { display: grid; grid-template-columns: 1fr 1fr; gap: 6px; }
        .clear-key { height: 65px; background: #607d8b; color: white; border: none; border-radius: var(--btn-radius); font-weight: bold; font-size: 1.1rem; }

        /* 設定パネル */
        .settings-panel { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 5000; display: none; padding: 20px; }
        .modal-content { background: #222; border-radius: 12px; padding: 20px; width: 100%; max-width: 350px; margin: auto; }
        .color-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-bottom: 20px; }
        .color-dot { width: 100%; aspect-ratio: 1/1; border-radius: 4px; cursor: pointer; border: 2px solid transparent; }
        .rate-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; }
        .rate-btn { background: #444; color: white; border: none; padding: 12px 0; border-radius: 4px; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="lists-view-port">
        <div class="lists-scroll-container" id="scrollContainer"></div>
    </div>

    <div class="keypad-container">
        <div class="control-grid">
            <button class="icon-btn" style="background:#546e7a" onclick="toggleSettings(true)">⚙ 歯車</button>
            <button class="icon-btn" style="background:#4db6ac" onclick="inputMemo()">🔍 検索</button>
            <button class="icon-btn" style="background:#ff8a65" onclick="togglePointMode()" id="p-btn">ポイント</button>
        </div>
        <div class="control-grid">
            <button class="icon-btn" style="background:#64b5f6" onclick="toggleYoko()" id="yoko-btn">横計算</button>
            <button class="icon-btn" style="background:#9575cd" onclick="toggle4Col()">4連電卓</button>
            <button class="icon-btn" style="background:#90a4ae" onclick="toggleFullscreen()">全画面</button>
        </div>

        <div class="grid-keys">
            <button class="key num-key" onclick="num(7)">7</button><button class="key num-key" onclick="num(8)">8</button><button class="key num-key" onclick="num(9)">9</button><button class="key op-key" onclick="back()">BS</button>
            <button class="key num-key" onclick="num(4)">4</button><button class="key num-key" onclick="num(5)">5</button><button class="key num-key" onclick="num(6)">6</button><button class="key op-key" onclick="multiply()">×</button>
            <button class="key num-key" onclick="num(1)">1</button><button class="key num-key" onclick="num(2)">2</button><button class="key num-key" onclick="num(3)">3</button><button class="key op-key" onclick="calcPercent()">%</button>
            <button class="key num-key" onclick="num(0)">0</button><button class="key num-key" onclick="num('00')">00</button><button class="key op-key" onclick="setOp('+')">+</button><button class="key op-key" onclick="setOp('-')">-</button>
        </div>

        <div class="reward-board" id="rewardBoard"></div>

        <div class="bottom-row">
            <button class="clear-key" onclick="masterClear()">AC 全消去</button>
            <button class="clear-key" onclick="columnClear()">列消去</button>
        </div>
    </div>
</div>

<div id="settings-panel" class="settings-panel">
    <div class="modal-content">
        <h3 style="margin:0 0 10px 0;">計算欄の背景色</h3>
        <div class="color-grid" id="colorGrid"></div>
        <h3 style="margin:0 0 10px 0;">還元率(%)</h3>
        <div class="rate-grid" id="rateOptions"></div>
        <button class="icon-btn" style="width:100%; margin-top:20px; background:#fff; color:#000;" onclick="toggleSettings(false)">閉じる</button>
    </div>
</div>

<script>
    let activeIdx = 0, selectedRowIdx = 0;
    let isHorizontal = false, is4Col = false, isPointMode = false;
    const ROW_COUNT = 15;
    let data = Array.from({length: 4}, () => Array.from({length: ROW_COUNT}, () => ({val: 0, isP: false, memo: "", rate: 10})));

    const colors = [
        '#e3f2fd', '#fce4ec', '#e8f5e9', '#fff3e0', '#f3e5f5', 
        '#ffffff', '#f5f5f5', '#e0f2f1', '#fffde7', '#d1c4e9'
    ];

    function init() {
        renderColumns();
        const cGrid = document.getElementById('colorGrid');
        colors.forEach(c => {
            const d = document.createElement('div');
            d.className = 'color-dot';
            d.style.background = c;
            d.onclick = () => { changeColor(c); };
            cGrid.appendChild(d);
        });
        const rGrid = document.getElementById('rateOptions');
        [1, 3, 5, 7, 8, 10, 15, 20].forEach(r => {
            const b = document.createElement('button');
            b.className = 'rate-btn';
            b.innerText = r + '%';
            b.onclick = () => { data[activeIdx][selectedRowIdx].rate = r; render(); };
            rGrid.appendChild(b);
        });
    }

    function renderColumns() {
        const container = document.getElementById('scrollContainer');
        container.innerHTML = '';
        const colCount = is4Col ? 4 : 3;
        for(let i=0; i < colCount; i++) {
            const col = document.createElement('div');
            col.className = 'list-column';
            col.innerHTML = `<div class="total-display" id="total-${i}">0</div><div class="history-area">${data[i].map((_, j) => `<div class="history-item" id="cell-${i}-${j}" onclick="selectCell(${i},${j})"></div>`).join('')}</div>`;
            container.appendChild(col);
        }
        render();
    }

    function render() {
        const board = document.getElementById('rewardBoard');
        board.innerHTML = '';
        const colCount = is4Col ? 4 : 3;

        for(let i=0; i < colCount; i++) {
            const list = data[i];
            const total = list.reduce((sum, item) => item.isP ? sum : sum + item.val, 0);
            document.getElementById(`total-${i}`).innerText = total.toLocaleString();

            const cur = list[selectedRowIdx];
            const cashP = Math.floor(cur.val * (cur.rate / 100));
            const cardR = Math.max(0, cur.rate - 2);
            const cardP = Math.floor(cur.val * (cardR / 100));
            board.innerHTML += `<div class="reward-col">
                <div class="reward-val">${cashP}</div>
                <div class="reward-card">${cardP}</div>
            </div>`;

            list.forEach((item, j) => {
                const el = document.getElementById(`cell-${i}-${j}`);
                if (el) {
                    let html = `<div class="memo-text">${item.memo}</div>`;
                    let valStr = item.val === 0 ? "" : item.val.toLocaleString();
                    if(item.isP && item.val !== 0) valStr = `<span class="p-mark">P</span>` + valStr;
                    html += `<div>${valStr}</div>`;
                    if(item.val !== 0) html += `<div style="font-size:0.5rem; color:#999;">${item.rate}%</div>`;
                    el.innerHTML = html;
                    el.classList.toggle('selected-row', (i === activeIdx && j === selectedRowIdx));
                }
            });
        }
    }

    function num(n) {
        const up = (idx) => {
            let target = data[idx][selectedRowIdx];
            let s = Math.abs(target.val).toString();
            target.val = (parseInt((s === "0" ? "" : s) + n) || 0) * (target.val < 0 ? -1 : 1);
            target.isP = isPointMode;
        };
        if(isHorizontal) { for(let i = activeIdx; i < (is4Col?4:3); i++) up(i); } else { up(activeIdx); }
        render();
    }

    function selectCell(l, r) { activeIdx = l; selectedRowIdx = r; render(); }
    function inputMemo() { const m = prompt("ラベルを入力", data[activeIdx][selectedRowIdx].memo); if(m !== null) { data[activeIdx][selectedRowIdx].memo = m; render(); } }
    function toggle4Col() { is4Col = !is4Col; data.forEach(l => l.forEach(item => { item.val = 0; item.isP = false; item.memo = ""; })); selectedRowIdx = 0; renderColumns(); }
    function toggleYoko() { isHorizontal = !isHorizontal; document.getElementById('yoko-btn').style.background = isHorizontal ? "#ffd700" : "#64b5f6"; document.getElementById('yoko-btn').style.color = isHorizontal ? "#000" : "#fff"; }
    function togglePointMode() { isPointMode = !isPointMode; document.getElementById('p-btn').style.border = isPointMode ? "2px solid #b71c1c" : "none"; }
    function changeColor(c) { document.documentElement.style.setProperty('--list-bg', c); }
    function toggleSettings(s) { document.getElementById('settings-panel').style.display = s ? 'flex' : 'none'; }
    function toggleFullscreen() { if (!document.fullscreenElement) { document.documentElement.requestFullscreen(); } else { document.exitFullscreen(); } }
    function back() { const b = (idx) => { let s = Math.abs(data[idx][selectedRowIdx].val).toString(); data[idx][selectedRowIdx].val = (parseInt(s.slice(0, -1)) || 0) * (data[idx][selectedRowIdx].val < 0 ? -1 : 1); }; if(isHorizontal) { for(let i=activeIdx; i<(is4Col?4:3); i++) b(i); } else { b(activeIdx); } render(); }
    function multiply() { const v = prompt("掛ける数"); if(v) { data[activeIdx][selectedRowIdx].val *= parseFloat(v); render(); } }
    function calcPercent() { const v = prompt("パーセント(%)"); if(v) { data[activeIdx][selectedRowIdx].val *= (parseFloat(v)/100); render(); } }
    function setOp(op) { const s = (idx) => data[idx][selectedRowIdx].val = Math.abs(data[idx][selectedRowIdx].val) * (op === '-' ? -1 : 1); if(isHorizontal) { for(let i=activeIdx; i<(is4Col?4:3); i++) s(i); } else { s(activeIdx); } render(); }
    function masterClear() { if(confirm("全消去しますか？")) { data.forEach(l => l.forEach(item => {item.val=0; item.isP=false; item.memo="";})); render(); } }
    function columnClear() { data[activeIdx].forEach(item => {item.val=0; item.isP=false; item.memo="";}); render(); }

    init();
</script>
</body>
</html>
